version: '3.8'

services:
  file-analyzer:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - API_BASE_URL=http://host.docker.internal:8000
      - PORT=8001
      - HOST=0.0.0.0
    volumes:
      - ./data:/app/data
    restart: unless-stopped